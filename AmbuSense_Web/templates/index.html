<!DOCTYPE html>
<html>
<head>
    <title>AmbuSense System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #2c3e50; color: white; padding: 50px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #34495e; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #e74c3c; font-size: 35px; margin-bottom: 5px; }
        .subtitle { color: #bdc3c7; font-size: 18px; margin-bottom: 40px; }
        .btn-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .btn { padding: 15px 30px; font-size: 20px; font-weight: bold; color: white; text-decoration: none; border-radius: 8px; width: 80%; transition: 0.3s; }
        .btn-driver { background: #e74c3c; border: 2px solid #c0392b; }
        .btn-driver:hover { background: #c0392b; transform: scale(1.05); }
        .btn-user { background: #3498db; border: 2px solid #2980b9; }
        .btn-user:hover { background: #2980b9; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚑 AmbuSense Auth</h1>
        <p class="subtitle">Please log in to continue</p>
        <div class="btn-container">
            <a href="/driver_login" class="btn btn-driver">👨‍⚕️ Login as Ambulance Driver</a>
            <a href="/user_login" class="btn btn-user">🚗 Login as General User</a>
        </div>
    </div>
    <script>
        // Feature 1: Persistent Login Check
        var role = localStorage.getItem("ambusense_role");
        if (role === "user") { window.location.href = "/user"; }
        else if (role === "driver") { window.location.href = "/driver"; }
    </script>
</body>
</html>
